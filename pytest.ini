[pytest]
; Sin este archivo, correr "pytest" (sin "python -m" antes) no
; encuentra el paquete "app" porque pytest inserta en sys.path la
; carpeta que contiene cada archivo de prueba (tests/), no la raíz
; del proyecto donde vive app/. "pythonpath = ." fuerza a que la raíz
; del proyecto siempre esté en sys.path, sin importar cómo se invoque
; pytest (terminal, VS Code, CI). Esto no cambia ninguna prueba ni
; ningún comportamiento — solo hace que "pytest" funcione igual que
; "python -m pytest" siempre.
pythonpath = .
