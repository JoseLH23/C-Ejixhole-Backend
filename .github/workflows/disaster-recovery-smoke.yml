name: DR - Backup and restore smoke

on:
  push:
    branches: [main]
    paths:
      - scripts/database_backup.py
      - scripts/database_restore.py
      - alembic/**
      - .github/workflows/disaster-recovery-smoke.yml
  pull_request:
    branches: [main]
    paths:
      - scripts/database_backup.py
      - scripts/database_restore.py
      - alembic/**
      - .github/workflows/disaster-recovery-smoke.yml
  schedule:
    - cron: "23 10 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  restore:
    name: Crear, restaurar y comparar
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      PYTHONPATH: .
      PGPASSWORD: postgres
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/source_db
      RESTORE_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/restore_db
      JWT_SECRET_KEY: clave-ci-recuperacion-nunca-usar-en-produccion-1234567890

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v6

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar proyecto
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Crear bases aisladas
        run: |
          psql postgresql://postgres:postgres@127.0.0.1:5432/postgres -v ON_ERROR_STOP=1 -c "CREATE DATABASE source_db"
          psql postgresql://postgres:postgres@127.0.0.1:5432/postgres -v ON_ERROR_STOP=1 -c "CREATE DATABASE restore_db"

      - name: Aplicar esquema real en origen
        run: alembic upgrade head

      - name: Crear respaldo con manifiesto
        run: python scripts/database_backup.py --output-dir .dr-artifacts --prefix ci

      - name: Restaurar respaldo verificado
        shell: bash
        run: |
          BACKUP="$(find .dr-artifacts -name '*.dump' -type f -print -quit)"
          test -n "$BACKUP"
          python scripts/database_restore.py \
            --backup "$BACKUP" \
            --target-database-url "$RESTORE_DATABASE_URL" \
            --confirm-database-name restore_db

      - name: Comparar esquema restaurado
        shell: bash
        run: |
          SOURCE_VERSION="$(psql "$DATABASE_URL" -tAc 'SELECT version_num FROM alembic_version LIMIT 1')"
          TARGET_VERSION="$(psql "$RESTORE_DATABASE_URL" -tAc 'SELECT version_num FROM alembic_version LIMIT 1')"
          SOURCE_TABLES="$(psql "$DATABASE_URL" -tAc "SELECT count(*) FROM information_schema.tables WHERE table_schema='public'")"
          TARGET_TABLES="$(psql "$RESTORE_DATABASE_URL" -tAc "SELECT count(*) FROM information_schema.tables WHERE table_schema='public'")"
          test "$SOURCE_VERSION" = "$TARGET_VERSION"
          test "$SOURCE_TABLES" = "$TARGET_TABLES"
          test "$TARGET_TABLES" -gt 0

      - name: Conservar manifiesto del simulacro
        uses: actions/upload-artifact@v7
        with:
          name: dr-smoke-manifest
          path: .dr-artifacts/*.manifest.json
          retention-days: 14
