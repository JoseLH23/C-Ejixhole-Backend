name: Preparación para piloto de producción

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - "scripts/production_pilot.py"
      - "tests/test_production_pilot.py"
      - "docs/production-pilot.md"
      - ".github/workflows/production-pilot.yml"

permissions:
  contents: read

env:
  BACKEND_URL: https://c-ejixhole-backend.onrender.com
  PORTAL_URL: https://ejixhole-reservas.vercel.app/
  ADMIN_URL: https://ejixhole-frontend.vercel.app/

jobs:
  readiness:
    name: Verificar despliegues sin modificar datos
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v7

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Ejecutar checklist público con reintentos
        run: |
          for intento in 1 2 3 4; do
            if python -m scripts.production_pilot; then
              exit 0
            fi
            if [ "$intento" -lt 4 ]; then
              echo "Reintento $intento/3 después de posible arranque en frío..."
              sleep 20
            fi
          done
          exit 1

      - name: Adjuntar reporte
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-readiness-${{ github.run_id }}
          if-no-files-found: ignore
          retention-days: 30
          path: production-pilot-report.md
