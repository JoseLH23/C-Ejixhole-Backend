name: Backend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Tests con Python 3.11
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      PYTHONPATH: .
      DATABASE_URL: sqlite:///./ci_test.db
      JWT_SECRET_KEY: clave-ci-segura-nunca-usar-en-produccion-1234567890
      ENVIRONMENT: test

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v7

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Ejecutar pruebas
        id: pytest
        continue-on-error: true
        run: pytest -q > pytest.log 2>&1

      - name: Configurar Node para contratos
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Exportar y validar OpenAPI
        run: |
          mkdir -p contract-output
          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path
          from app.main import app

          schema = app.openapi()
          schema.setdefault("info", {})["x-api-line"] = "v1"
          schema["info"]["x-typescript-generator"] = "openapi-typescript@7.8.0"
          methods = {"get", "post", "put", "patch", "delete", "options", "head"}
          infrastructure = {"/", "/status", "/health", "/health/ready"}
          operation_ids = set()
          errors = []
          for path, path_item in schema.get("paths", {}).items():
              for method, operation in path_item.items():
                  if method.lower() not in methods or not isinstance(operation, dict):
                      continue
                  operation_id = operation.get("operationId")
                  if not operation_id:
                      errors.append(f"{method.upper()} {path} sin operationId")
                  elif operation_id in operation_ids:
                      errors.append(f"operationId duplicado: {operation_id}")
                  else:
                      operation_ids.add(operation_id)
                  if not operation.get("responses"):
                      errors.append(f"{method.upper()} {path} sin respuestas")
                  if not path.startswith("/api/v1") and path not in infrastructure and not operation.get("deprecated"):
                      errors.append(f"Ruta no versionada: {method.upper()} {path}")
          if schema.get("openapi") != "3.1.0":
              errors.append("Se requiere OpenAPI 3.1.0")
          if not schema.get("components", {}).get("schemas"):
              errors.append("No existen schemas reutilizables")
          if errors:
              raise SystemExit("Contrato inválido:\n- " + "\n- ".join(errors))
          text = json.dumps(schema, ensure_ascii=False, indent=2, sort_keys=True) + "\n"
          digest = hashlib.sha256(text.encode()).hexdigest()
          Path("contract-output/openapi-v1.json").write_text(text, encoding="utf-8")
          manifest = {
              "schema_version": 1,
              "api_line": "v1",
              "application_version": schema["info"].get("version"),
              "openapi_version": schema.get("openapi"),
              "openapi_sha256": digest,
              "paths": len(schema.get("paths", {})),
              "schemas": len(schema.get("components", {}).get("schemas", {})),
              "typescript_generator": "openapi-typescript@7.8.0",
          }
          Path("contract-output/openapi-manifest.json").write_text(
              json.dumps(manifest, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          print(manifest)
          PY

      - name: Generar tipos TypeScript
        run: npx --yes openapi-typescript@7.8.0 contract-output/openapi-v1.json -o contract-output/ejixhole-api.ts

      - name: Generar evidencia de integridad
        run: sha256sum contract-output/* > contract-output/SHA256SUMS

      - name: Publicar contrato generado
        uses: actions/upload-artifact@v7
        with:
          name: ejixhole-api-contract-${{ github.sha }}
          path: contract-output/
          retention-days: 90

      - name: Publicar primer fallo en el PR
        if: steps.pytest.outcome == 'failure' && github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const lines = fs.readFileSync('pytest.log', 'utf8').trim().split('\n');
            const tail = lines.slice(-120).join('\n');
            const marker = '<!-- backend-ci-pytest -->';
            const body = `${marker}\n### Fallo de pruebas del backend\n\n\`\`\`text\n${tail}\n\`\`\``;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const previous = comments.find(c => c.body && c.body.includes(marker));
            if (previous) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: previous.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Marcar pruebas como fallidas
        if: steps.pytest.outcome == 'failure'
        run: exit 1

  postgres-migrations:
    name: Validar migraciones PostgreSQL
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: ejixhole_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ejixhole_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/ejixhole_ci
      JWT_SECRET_KEY: clave-ci-segura-nunca-usar-en-produccion-1234567890

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v7

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Confirmar una sola cabeza Alembic
        run: |
          test "$(alembic heads | wc -l)" -eq 1

      - name: Aplicar migraciones desde cero
        run: alembic upgrade head

      - name: Confirmar revision actual
        run: alembic current

      - name: Probar downgrade completo en base desechable
        run: alembic downgrade base

      - name: Reaplicar todo el historial
        run: alembic upgrade head

      - name: Verificar que modelos y migraciones estan sincronizados
        run: alembic check

  postgres-backup-restore:
    name: Probar respaldo y restauracion PostgreSQL
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: ejixhole_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ejixhole_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/ejixhole_ci
      JWT_SECRET_KEY: clave-ci-segura-nunca-usar-en-produccion-1234567890

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v7

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Aplicar migraciones
        run: alembic upgrade head

      - name: Localizar contenedor PostgreSQL
        run: |
          POSTGRES_CONTAINER="$(docker ps --filter "ancestor=postgres:17" --format '{{.ID}}' | head -n 1)"
          test -n "$POSTGRES_CONTAINER"
          echo "POSTGRES_CONTAINER=$POSTGRES_CONTAINER" >> "$GITHUB_ENV"

      - name: Crear dato de verificacion
        run: |
          docker exec "$POSTGRES_CONTAINER" psql \
            -U postgres \
            -d ejixhole_ci \
            -v ON_ERROR_STOP=1 \
            -c "CREATE TABLE backup_restore_probe (id integer PRIMARY KEY, payload text NOT NULL); INSERT INTO backup_restore_probe (id, payload) VALUES (1, 'backup-ok');"

      - name: Crear respaldo
        run: |
          docker exec "$POSTGRES_CONTAINER" pg_dump \
            -U postgres \
            -d ejixhole_ci \
            --format=custom \
            --no-owner \
            --no-privileges \
            --file=/tmp/ejixhole.dump
          docker exec "$POSTGRES_CONTAINER" test -s /tmp/ejixhole.dump
          docker cp "$POSTGRES_CONTAINER:/tmp/ejixhole.dump" "$RUNNER_TEMP/ejixhole.dump"
          test -s "$RUNNER_TEMP/ejixhole.dump"
          sha256sum "$RUNNER_TEMP/ejixhole.dump" > "$RUNNER_TEMP/ejixhole.dump.sha256"

      - name: Restaurar en base temporal
        run: |
          docker exec "$POSTGRES_CONTAINER" createdb \
            -U postgres \
            --template=template0 \
            ejixhole_restore
          docker exec "$POSTGRES_CONTAINER" pg_restore \
            -U postgres \
            -d ejixhole_restore \
            --clean \
            --if-exists \
            --no-owner \
            --no-privileges \
            --exit-on-error \
            /tmp/ejixhole.dump

      - name: Verificar restauracion
        run: |
          PROBE="$(docker exec "$POSTGRES_CONTAINER" psql -U postgres -d ejixhole_restore -Atc "SELECT payload FROM backup_restore_probe WHERE id = 1;")"
          REVISION="$(docker exec "$POSTGRES_CONTAINER" psql -U postgres -d ejixhole_restore -Atc "SELECT version_num FROM alembic_version LIMIT 1;")"
          test "$PROBE" = "backup-ok"
          test -n "$REVISION"
          echo "Restauracion verificada en revision Alembic: $REVISION"
