name: Backend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Tests con Python 3.11
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      PYTHONPATH: .
      DATABASE_URL: sqlite:///./ci_test.db
      JWT_SECRET_KEY: clave-ci-segura-nunca-usar-en-produccion-1234567890

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v7

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Ejecutar pruebas
        run: pytest -q

  postgres-migrations:
    name: Validar migraciones PostgreSQL
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: ejixhole_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ejixhole_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/ejixhole_ci
      JWT_SECRET_KEY: clave-ci-segura-nunca-usar-en-produccion-1234567890

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v7

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Confirmar una sola cabeza Alembic
        run: |
          test "$(alembic heads | wc -l)" -eq 1

      - name: Aplicar migraciones desde cero
        run: alembic upgrade head

      - name: Confirmar revision actual
        run: alembic current

      - name: Probar downgrade completo en base desechable
        run: alembic downgrade base

      - name: Reaplicar todo el historial
        run: alembic upgrade head

      - name: Verificar que modelos y migraciones estan sincronizados
        run: alembic check
